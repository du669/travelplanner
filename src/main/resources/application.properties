spring.application.name=travelplanner
server.port=8080
spring.config.import=optional:file:.env.properties

travel.ai.enabled=${TRAVEL_AI_ENABLED:false}
travel.ai.base-url=${TRAVEL_AI_BASE_URL:https://api.openai.com/v1}
travel.ai.api-key=${TRAVEL_AI_API_KEY:}
travel.ai.model=${TRAVEL_AI_MODEL:gpt-4.1-mini}
travel.ai.temperature=${TRAVEL_AI_TEMPERATURE:0.4}
travel.ai.timeout=${TRAVEL_AI_TIMEOUT:180s}
travel.map.amap.web-key=${AMAP_WEB_KEY:}
travel.map.amap.web-security-code=${AMAP_WEB_SECURITY_CODE:}
travel.map.amap.web-service-key=${AMAP_WEB_SERVICE_KEY:}

spring.application.name=travelplanner
server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/travelplanner?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

travel.ai.enabled=${TRAVEL_AI_ENABLED:false}
travel.ai.base-url=${TRAVEL_AI_BASE_URL:https://api.openai.com/v1}
travel.ai.api-key=${TRAVEL_AI_API_KEY:}
travel.ai.model=${TRAVEL_AI_MODEL:gpt-4.1-mini}
travel.ai.temperature=${TRAVEL_AI_TEMPERATURE:0.4}
travel.ai.timeout=${TRAVEL_AI_TIMEOUT:30s}
